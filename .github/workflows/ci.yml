name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y appstream desktop-file-utils

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-anyio pytest-asyncio pytest-cov pytest-mock

      - name: Run tests
        run: python3 -m pytest tests -v

      - name: Validate desktop file
        run: desktop-file-validate data/io.github.srpvpn.pulse.desktop

      - name: Validate AppStream metadata
        run: appstreamcli validate data/io.github.srpvpn.pulse.metainfo.xml
